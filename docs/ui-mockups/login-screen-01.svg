<?xml version="1.0" encoding="UTF-8"?>
<!-- Mind Compass 로그인 화면을 모바일 앱 목업 스타일로 그린 SVG다. -->
<svg width="390" height="844" viewBox="0 0 390 844" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="390" height="844" fill="#F6F7FB"/>
  <rect x="18" y="16" width="354" height="812" rx="28" fill="#FFFFFF"/>

  <!-- logo area -->
  <circle cx="195" cy="146" r="34" fill="#EAF3FF"/>
  <circle cx="195" cy="146" r="18" fill="#FFFFFF" stroke="#AFCBFA" stroke-width="2"/>
  <path d="M195 132V160" stroke="#6DA8FF" stroke-width="2.6" stroke-linecap="round"/>
  <path d="M181 146H209" stroke="#6DA8FF" stroke-width="2.6" stroke-linecap="round"/>
  <path d="M185 136L205 156" stroke="#6DA8FF" stroke-width="2.2" stroke-linecap="round"/>
  <path d="M205 136L185 156" stroke="#6DA8FF" stroke-width="2.2" stroke-linecap="round"/>

  <text x="154" y="204" fill="#20242C" font-family="Pretendard, Apple SD Gothic Neo, sans-serif" font-size="22" font-weight="800">감정나침반</text>
  <text x="112" y="228" fill="#8B95A5" font-family="Pretendard, Apple SD Gothic Neo, sans-serif" font-size="13" font-weight="500">하루의 감정과 회복 흐름을 함께 기록해요</text>

  <!-- fields -->
  <text x="42" y="302" fill="#1F2835" font-family="Pretendard, Apple SD Gothic Neo, sans-serif" font-size="13" font-weight="700">이메일</text>
  <rect x="34" y="316" width="322" height="48" rx="14" fill="#F8FAFC" stroke="#E9EDF3"/>
  <text x="50" y="346" fill="#A0A8B5" font-family="Pretendard, Apple SD Gothic Neo, sans-serif" font-size="13" font-weight="500">example@email.com</text>

  <text x="42" y="404" fill="#1F2835" font-family="Pretendard, Apple SD Gothic Neo, sans-serif" font-size="13" font-weight="700">비밀번호</text>
  <rect x="34" y="418" width="322" height="48" rx="14" fill="#F8FAFC" stroke="#E9EDF3"/>
  <text x="50" y="448" fill="#A0A8B5" font-family="Pretendard, Apple SD Gothic Neo, sans-serif" font-size="13" font-weight="500">8자 이상 입력해주세요</text>

  <!-- options -->
  <circle cx="46" cy="500" r="6" fill="#5E9BF5"/>
  <circle cx="46" cy="500" r="2.5" fill="#FFFFFF"/>
  <text x="60" y="505" fill="#6E7A8C" font-family="Pretendard, Apple SD Gothic Neo, sans-serif" font-size="12" font-weight="500">로그인 상태 유지</text>
  <text x="273" y="505" fill="#5E9BF5" font-family="Pretendard, Apple SD Gothic Neo, sans-serif" font-size="12" font-weight="700">비밀번호 찾기</text>

  <!-- login button -->
  <rect x="34" y="544" width="322" height="50" rx="25" fill="#5E9BF5"/>
  <text x="170" y="575" fill="#FFFFFF" font-family="Pretendard, Apple SD Gothic Neo, sans-serif" font-size="15" font-weight="700">로그인</text>

  <!-- divider -->
  <path d="M34 642H150" stroke="#E6EBF2"/>
  <path d="M240 642H356" stroke="#E6EBF2"/>
  <text x="173" y="646" fill="#A1A9B5" font-family="Pretendard, Apple SD Gothic Neo, sans-serif" font-size="11" font-weight="600">또는</text>

  <!-- secondary button -->
  <rect x="34" y="676" width="322" height="50" rx="25" fill="#FFFFFF" stroke="#D9E3F6" stroke-width="2"/>
  <text x="154" y="707" fill="#5E88D9" font-family="Pretendard, Apple SD Gothic Neo, sans-serif" font-size="15" font-weight="700">회원가입</text>

  <!-- bottom helper -->
  <text x="116" y="780" fill="#98A2B0" font-family="Pretendard, Apple SD Gothic Neo, sans-serif" font-size="12" font-weight="500">처음이라면 감정 기록부터 시작해보세요</text>
</svg>
