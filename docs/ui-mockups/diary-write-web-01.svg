<?xml version="1.0" encoding="UTF-8"?>
<!-- 마인드 컴퍼스 일기 작성 웹 반응형 목업 -->
<svg width="1440" height="1024" viewBox="0 0 1440 1024" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="1440" height="1024" fill="#F4F7FB"/>
  <rect x="24" y="24" width="1392" height="976" rx="28" fill="#FFFFFF"/>
  <text x="60" y="84" fill="#1F2A37" font-family="Pretendard, Apple SD Gothic Neo, sans-serif" font-size="32" font-weight="800">일기 작성</text>
  <text x="60" y="114" fill="#7D8998" font-family="Pretendard, Apple SD Gothic Neo, sans-serif" font-size="15" font-weight="500">오늘의 감정과 하루를 편하게 기록해요</text>
  <rect x="60" y="150" width="820" height="786" rx="28" fill="#FFFFFF" stroke="#E9EDF3"/>
  <text x="98" y="202" fill="#1F2A37" font-family="Pretendard, Apple SD Gothic Neo, sans-serif" font-size="20" font-weight="700">오늘 하루는 어땠나요?</text>
  <rect x="98" y="228" width="744" height="58" rx="16" fill="#F8FAFF" stroke="#E7EDF8"/>
  <text x="122" y="264" fill="#9AA4B2" font-family="Pretendard, Apple SD Gothic Neo, sans-serif" font-size="15" font-weight="500">제목을 입력하세요</text>
  <rect x="98" y="306" width="744" height="246" rx="20" fill="#F8FAFF" stroke="#E7EDF8"/>
  <text x="122" y="344" fill="#9AA4B2" font-family="Pretendard, Apple SD Gothic Neo, sans-serif" font-size="15" font-weight="500">오늘 느낀 생각과 감정을 자유롭게 적어보세요</text>
  <text x="98" y="596" fill="#1F2A37" font-family="Pretendard, Apple SD Gothic Neo, sans-serif" font-size="18" font-weight="700">대표 감정</text>
  <rect x="98" y="618" width="92" height="36" rx="18" fill="#FFF7D6"/><text x="128" y="641" fill="#77630F" font-family="Pretendard, Apple SD Gothic Neo, sans-serif" font-size="14" font-weight="700">불안</text>
  <rect x="202" y="618" width="92" height="36" rx="18" fill="#EAF3FF"/><text x="232" y="641" fill="#4E86E6" font-family="Pretendard, Apple SD Gothic Neo, sans-serif" font-size="14" font-weight="700">차분</text>
  <rect x="306" y="618" width="92" height="36" rx="18" fill="#EEF9EF"/><text x="336" y="641" fill="#4A915B" font-family="Pretendard, Apple SD Gothic Neo, sans-serif" font-size="14" font-weight="700">지침</text>
  <rect x="410" y="618" width="112" height="36" rx="18" fill="#FFF0F1"/><text x="442" y="641" fill="#C76F78" font-family="Pretendard, Apple SD Gothic Neo, sans-serif" font-size="14" font-weight="700">과부하</text>
  <text x="98" y="706" fill="#1F2A37" font-family="Pretendard, Apple SD Gothic Neo, sans-serif" font-size="18" font-weight="700">감정 강도</text>
  <rect x="98" y="730" width="420" height="8" rx="4" fill="#E2E7EF"/>
  <rect x="98" y="730" width="286" height="8" rx="4" fill="#5E9BF5"/>
  <circle cx="384" cy="734" r="12" fill="#FFFFFF" stroke="#5E9BF5" stroke-width="3"/>
  <text x="542" y="739" fill="#4D7FE0" font-family="Pretendard, Apple SD Gothic Neo, sans-serif" font-size="14" font-weight="700">4 / 5</text>
  <rect x="98" y="826" width="180" height="48" rx="24" fill="#5E9BF5"/><text x="154" y="856" fill="#FFFFFF" font-family="Pretendard, Apple SD Gothic Neo, sans-serif" font-size="15" font-weight="700">일기 저장</text>
  <rect x="294" y="826" width="180" height="48" rx="24" fill="#F3F6FA"/><text x="345" y="856" fill="#607083" font-family="Pretendard, Apple SD Gothic Neo, sans-serif" font-size="15" font-weight="700">임시 저장</text>
  <rect x="912" y="150" width="464" height="786" rx="28" fill="#F8FAFF" stroke="#E7EDF8"/>
  <text x="946" y="202" fill="#1F2A37" font-family="Pretendard, Apple SD Gothic Neo, sans-serif" font-size="22" font-weight="800">작성 가이드</text>
  <rect x="946" y="236" width="396" height="108" rx="20" fill="#FFFFFF"/>
  <text x="970" y="272" fill="#1F2A37" font-family="Pretendard, Apple SD Gothic Neo, sans-serif" font-size="15" font-weight="700">부담 없이 기록하기</text>
  <text x="970" y="300" fill="#677384" font-family="Pretendard, Apple SD Gothic Neo, sans-serif" font-size="13" font-weight="500">완벽하게 쓰지 않아도 괜찮아요. 오늘 가장 크게 느낀 감정부터 적어보세요.</text>
  <rect x="946" y="368" width="396" height="132" rx="20" fill="#FFFFFF"/>
  <text x="970" y="404" fill="#1F2A37" font-family="Pretendard, Apple SD Gothic Neo, sans-serif" font-size="15" font-weight="700">저장 후 기대 흐름</text>
  <text x="970" y="432" fill="#677384" font-family="Pretendard, Apple SD Gothic Neo, sans-serif" font-size="13" font-weight="500">1. 일기 저장</text>
  <text x="970" y="454" fill="#677384" font-family="Pretendard, Apple SD Gothic Neo, sans-serif" font-size="13" font-weight="500">2. AI 감정 분석 및 위험도 후처리</text>
  <text x="970" y="476" fill="#677384" font-family="Pretendard, Apple SD Gothic Neo, sans-serif" font-size="13" font-weight="500">3. 상세 화면에서 분석 결과와 채팅 연결 제공</text>
  <rect x="946" y="524" width="396" height="140" rx="20" fill="#FFFDF8" stroke="#F0E6C7"/>
  <text x="970" y="560" fill="#1F2A37" font-family="Pretendard, Apple SD Gothic Neo, sans-serif" font-size="15" font-weight="700">웹 반응형 포인트</text>
  <text x="970" y="588" fill="#8B846E" font-family="Pretendard, Apple SD Gothic Neo, sans-serif" font-size="13" font-weight="500">모바일에서는 입력 필드가 세로로 쌓이지만, 웹에서는 좌측 입력과 우측 가이드 구조로 나뉩니다.</text>
</svg>
