<?xml version="1.0" encoding="UTF-8"?>
<!-- Mind Compass 리포트 화면을 모바일 앱 목업 스타일로 그린 SVG다. -->
<svg width="390" height="844" viewBox="0 0 390 844" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="390" height="844" fill="#F6F7FB"/>

  <rect x="18" y="16" width="354" height="812" rx="28" fill="#FFFFFF"/>

  <!-- header -->
  <path d="M42 58 L34 66 L42 74" stroke="#2C3440" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="165" y="69" fill="#20242C" font-family="Pretendard, Apple SD Gothic Neo, sans-serif" font-size="16" font-weight="700">감정 리포트</text>
  <circle cx="338" cy="66" r="14" fill="#EAF3FF"/>
  <text x="331" y="70" fill="#5E9BF5" font-family="Pretendard, Apple SD Gothic Neo, sans-serif" font-size="10" font-weight="800">5월</text>

  <!-- monthly summary -->
  <rect x="34" y="100" width="322" height="132" rx="18" fill="#F8FAFF" stroke="#E7EDF8"/>
  <text x="50" y="130" fill="#1E2633" font-family="Pretendard, Apple SD Gothic Neo, sans-serif" font-size="18" font-weight="800">5월 감정 리포트</text>
  <text x="50" y="152" fill="#7C8798" font-family="Pretendard, Apple SD Gothic Neo, sans-serif" font-size="12" font-weight="500">이번 달의 감정 흐름과 기록 요약</text>

  <rect x="50" y="170" width="84" height="44" rx="12" fill="#FFFFFF"/>
  <text x="64" y="187" fill="#8A94A4" font-family="Pretendard, Apple SD Gothic Neo, sans-serif" font-size="10" font-weight="700">기록 수</text>
  <text x="80" y="205" fill="#20242C" font-family="Pretendard, Apple SD Gothic Neo, sans-serif" font-size="20" font-weight="800">18</text>

  <rect x="144" y="170" width="84" height="44" rx="12" fill="#FFFFFF"/>
  <text x="156" y="187" fill="#8A94A4" font-family="Pretendard, Apple SD Gothic Neo, sans-serif" font-size="10" font-weight="700">평균 강도</text>
  <text x="170" y="205" fill="#20242C" font-family="Pretendard, Apple SD Gothic Neo, sans-serif" font-size="20" font-weight="800">3.6</text>

  <rect x="238" y="170" width="98" height="44" rx="12" fill="#FFFFFF"/>
  <text x="251" y="187" fill="#8A94A4" font-family="Pretendard, Apple SD Gothic Neo, sans-serif" font-size="10" font-weight="700">대표 감정</text>
  <text x="267" y="205" fill="#20242C" font-family="Pretendard, Apple SD Gothic Neo, sans-serif" font-size="18" font-weight="800">불안</text>

  <!-- weekly trend chart card -->
  <rect x="34" y="248" width="322" height="170" rx="18" fill="#FFFFFF" stroke="#E9EDF3"/>
  <text x="50" y="278" fill="#1F2835" font-family="Pretendard, Apple SD Gothic Neo, sans-serif" font-size="16" font-weight="800">감정 변화 추이</text>
  <text x="50" y="299" fill="#8791A0" font-family="Pretendard, Apple SD Gothic Neo, sans-serif" font-size="11" font-weight="600">최근 7일 감정 강도 변화</text>

  <!-- chart -->
  <path d="M58 378H332" stroke="#E8EDF5"/>
  <path d="M58 349H332" stroke="#EEF2F8"/>
  <path d="M58 320H332" stroke="#EEF2F8"/>
  <path d="M58 291H332" stroke="#EEF2F8"/>

  <path d="M60 356 C95 340, 110 330, 145 334 C180 338, 195 304, 230 308 C265 312, 282 286, 326 295"
        stroke="#5E9BF5" stroke-width="3.5" fill="none" stroke-linecap="round"/>

  <circle cx="60" cy="356" r="4" fill="#5E9BF5"/>
  <circle cx="145" cy="334" r="4" fill="#5E9BF5"/>
  <circle cx="230" cy="308" r="4" fill="#5E9BF5"/>
  <circle cx="326" cy="295" r="4" fill="#5E9BF5"/>

  <g fill="#8D97A7" font-family="Pretendard, Apple SD Gothic Neo, sans-serif" font-size="10" font-weight="600">
    <text x="55" y="397">월</text>
    <text x="100" y="397">화</text>
    <text x="145" y="397">수</text>
    <text x="190" y="397">목</text>
    <text x="235" y="397">금</text>
    <text x="280" y="397">토</text>
    <text x="323" y="397">일</text>
  </g>

  <!-- top emotions -->
  <rect x="34" y="434" width="322" height="112" rx="18" fill="#FFFFFF" stroke="#E9EDF3"/>
  <text x="50" y="463" fill="#1F2835" font-family="Pretendard, Apple SD Gothic Neo, sans-serif" font-size="16" font-weight="800">가장 많이 느낀 감정</text>

  <rect x="50" y="482" width="74" height="28" rx="14" fill="#FFF8D8"/>
  <text x="69" y="500" fill="#7A6717" font-family="Pretendard, Apple SD Gothic Neo, sans-serif" font-size="11" font-weight="700">불안 4회</text>

  <rect x="132" y="482" width="74" height="28" rx="14" fill="#E9F2FF"/>
  <text x="150" y="500" fill="#4E7DDD" font-family="Pretendard, Apple SD Gothic Neo, sans-serif" font-size="11" font-weight="700">안정 3회</text>

  <rect x="214" y="482" width="88" height="28" rx="14" fill="#EEF9EF"/>
  <text x="232" y="500" fill="#4A915B" font-family="Pretendard, Apple SD Gothic Neo, sans-serif" font-size="11" font-weight="700">회복중 3회</text>

  <text x="50" y="529" fill="#7D8796" font-family="Pretendard, Apple SD Gothic Neo, sans-serif" font-size="12" font-weight="500">불안이 가장 자주 기록되었지만,</text>
  <text x="50" y="547" fill="#7D8796" font-family="Pretendard, Apple SD Gothic Neo, sans-serif" font-size="12" font-weight="500">후반부에는 안정/회복 계열 기록도 함께 나타났어요.</text>

  <!-- risk trend -->
  <rect x="34" y="562" width="322" height="154" rx="18" fill="#FFFDF8" stroke="#F0E6C7"/>
  <text x="50" y="591" fill="#1F2835" font-family="Pretendard, Apple SD Gothic Neo, sans-serif" font-size="16" font-weight="800">위험도 흐름</text>
  <text x="50" y="612" fill="#8E8A73" font-family="Pretendard, Apple SD Gothic Neo, sans-serif" font-size="11" font-weight="600">중위험/고위험 감지 일수</text>

  <rect x="52" y="686" width="22" height="10" rx="5" fill="#FFD645"/>
  <text x="82" y="695" fill="#8A7B4C" font-family="Pretendard, Apple SD Gothic Neo, sans-serif" font-size="10" font-weight="700">중위험 2회</text>
  <rect x="150" y="686" width="22" height="10" rx="5" fill="#F5A1A1"/>
  <text x="180" y="695" fill="#8A7B4C" font-family="Pretendard, Apple SD Gothic Neo, sans-serif" font-size="10" font-weight="700">고위험 1회</text>

  <!-- bars -->
  <path d="M58 668H332" stroke="#EDE9DB"/>
  <rect x="68" y="650" width="18" height="18" rx="6" fill="#FFD645"/>
  <rect x="104" y="640" width="18" height="28" rx="6" fill="#FFD645"/>
  <rect x="140" y="656" width="18" height="12" rx="6" fill="#F5A1A1"/>
  <rect x="176" y="668" width="18" height="0" rx="6" fill="#FFD645"/>
  <rect x="212" y="648" width="18" height="20" rx="6" fill="#FFD645"/>
  <rect x="248" y="668" width="18" height="0" rx="6" fill="#F5A1A1"/>
  <rect x="284" y="668" width="18" height="0" rx="6" fill="#FFD645"/>

  <!-- bottom nav -->
  <rect x="18" y="756" width="354" height="72" fill="#FFFFFF"/>
  <path d="M18 756H372" stroke="#EFF2F7"/>

  <g opacity="0.45">
    <rect x="54" y="777" width="18" height="18" rx="4" fill="#ABB4C0"/>
    <text x="42" y="812" fill="#8C95A2" font-family="Pretendard, Apple SD Gothic Neo, sans-serif" font-size="11" font-weight="700">캘린더</text>
  </g>
  <g opacity="0.45">
    <rect x="142" y="777" width="18" height="18" rx="4" fill="#ABB4C0"/>
    <text x="134" y="812" fill="#8C95A2" font-family="Pretendard, Apple SD Gothic Neo, sans-serif" font-size="11" font-weight="700">기록</text>
  </g>
  <g opacity="0.45">
    <rect x="230" y="777" width="18" height="18" rx="4" fill="#ABB4C0"/>
    <text x="221" y="812" fill="#8C95A2" font-family="Pretendard, Apple SD Gothic Neo, sans-serif" font-size="11" font-weight="700">대화</text>
  </g>
  <g>
    <rect x="318" y="777" width="18" height="18" rx="4" fill="#5E9BF5"/>
    <text x="309" y="812" fill="#5E9BF5" font-family="Pretendard, Apple SD Gothic Neo, sans-serif" font-size="11" font-weight="700">리포트</text>
  </g>
</svg>
