<?xml version="1.0" encoding="UTF-8"?>
<!-- Mind Compass 일기 상세 화면을 모바일 앱 목업 스타일로 그린 SVG다. -->
<svg width="390" height="844" viewBox="0 0 390 844" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="390" height="844" fill="#F6F7FB"/>

  <rect x="18" y="16" width="354" height="812" rx="28" fill="#FFFFFF"/>

  <!-- header -->
  <path d="M42 58 L34 66 L42 74" stroke="#2C3440" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="150" y="69" fill="#20242C" font-family="Pretendard, Apple SD Gothic Neo, sans-serif" font-size="16" font-weight="700">오늘의 기록 분석</text>
  <circle cx="343" cy="66" r="4" fill="#D7DDE6"/>
  <circle cx="332" cy="66" r="4" fill="#D7DDE6"/>
  <circle cx="321" cy="66" r="4" fill="#D7DDE6"/>

  <!-- date and title -->
  <text x="34" y="116" fill="#8893A2" font-family="Pretendard, Apple SD Gothic Neo, sans-serif" font-size="12" font-weight="700">2024년 5월 18일 화요일</text>
  <text x="34" y="145" fill="#1F2733" font-family="Pretendard, Apple SD Gothic Neo, sans-serif" font-size="24" font-weight="800">오늘 하루는 버거웠다</text>

  <!-- diary body card -->
  <rect x="34" y="168" width="322" height="136" rx="18" fill="#F8FAFC" stroke="#E9EDF3"/>
  <text x="50" y="198" fill="#4D5767" font-family="Pretendard, Apple SD Gothic Neo, sans-serif" font-size="13" font-weight="500">오늘은 해야 할 일이 많았고 집중은 잘되지 않았다.</text>
  <text x="50" y="218" fill="#4D5767" font-family="Pretendard, Apple SD Gothic Neo, sans-serif" font-size="13" font-weight="500">하루 종일 불안이 길게 이어졌고 작은 일에도 예민했다.</text>
  <text x="50" y="238" fill="#4D5767" font-family="Pretendard, Apple SD Gothic Neo, sans-serif" font-size="13" font-weight="500">저녁이 되면서 조금 진정됐지만 완전히 편해지지는 않았다.</text>

  <rect x="50" y="260" width="74" height="24" rx="12" fill="#FFF8D8"/>
  <text x="72" y="276" fill="#77630F" font-family="Pretendard, Apple SD Gothic Neo, sans-serif" font-size="11" font-weight="700">불안</text>
  <rect x="132" y="260" width="66" height="24" rx="12" fill="#E9F2FF"/>
  <text x="152" y="276" fill="#4E7DDD" font-family="Pretendard, Apple SD Gothic Neo, sans-serif" font-size="11" font-weight="700">예민</text>
  <rect x="206" y="260" width="70" height="24" rx="12" fill="#EEF9EF"/>
  <text x="227" y="276" fill="#4A915B" font-family="Pretendard, Apple SD Gothic Neo, sans-serif" font-size="11" font-weight="700">지침</text>

  <!-- AI summary card -->
  <rect x="34" y="322" width="322" height="132" rx="18" fill="#F8FAFF" stroke="#E7EDF8"/>
  <text x="50" y="352" fill="#1E2633" font-family="Pretendard, Apple SD Gothic Neo, sans-serif" font-size="17" font-weight="800">AI 감정 분석</text>
  <text x="50" y="375" fill="#7F8A9B" font-family="Pretendard, Apple SD Gothic Neo, sans-serif" font-size="11" font-weight="700">대표 감정 · ANXIOUS</text>
  <text x="50" y="402" fill="#4C5666" font-family="Pretendard, Apple SD Gothic Neo, sans-serif" font-size="13" font-weight="500">하루 전반에 불안이 강하게 유지되었고,</text>
  <text x="50" y="422" fill="#4C5666" font-family="Pretendard, Apple SD Gothic Neo, sans-serif" font-size="13" font-weight="500">저녁에는 조금 회복되는 흐름이 확인됩니다.</text>

  <rect x="263" y="342" width="69" height="24" rx="12" fill="#EBF6EF"/>
  <text x="280" y="358" fill="#4A915B" font-family="Pretendard, Apple SD Gothic Neo, sans-serif" font-size="11" font-weight="700">신뢰도 81%</text>

  <!-- risk card -->
  <rect x="34" y="472" width="322" height="124" rx="18" fill="#FFF9E9" stroke="#F3E0A1"/>
  <text x="50" y="503" fill="#58440D" font-family="Pretendard, Apple SD Gothic Neo, sans-serif" font-size="17" font-weight="800">주의 신호</text>
  <text x="50" y="527" fill="#8B742A" font-family="Pretendard, Apple SD Gothic Neo, sans-serif" font-size="12" font-weight="700">중위험 · SUPPORTIVE RESPONSE</text>
  <text x="50" y="551" fill="#66573A" font-family="Pretendard, Apple SD Gothic Neo, sans-serif" font-size="12" font-weight="500">현재 많이 지친 상태로 보여요.</text>
  <text x="50" y="569" fill="#66573A" font-family="Pretendard, Apple SD Gothic Neo, sans-serif" font-size="12" font-weight="500">혼자 감당하기 어렵다면 믿을 수 있는 사람에게</text>
  <text x="50" y="587" fill="#66573A" font-family="Pretendard, Apple SD Gothic Neo, sans-serif" font-size="12" font-weight="500">도움을 요청해보세요.</text>

  <!-- emotion intensity -->
  <rect x="34" y="614" width="322" height="80" rx="18" fill="#FFFFFF" stroke="#E9EDF3"/>
  <text x="50" y="642" fill="#1F2835" font-family="Pretendard, Apple SD Gothic Neo, sans-serif" font-size="14" font-weight="700">감정 강도</text>
  <rect x="50" y="660" width="240" height="6" rx="3" fill="#E2E7EF"/>
  <rect x="50" y="660" width="176" height="6" rx="3" fill="#5E9BF5"/>
  <circle cx="226" cy="663" r="10" fill="#FFFFFF" stroke="#5E9BF5" stroke-width="3"/>
  <text x="305" y="666" fill="#4D7FE0" font-family="Pretendard, Apple SD Gothic Neo, sans-serif" font-size="12" font-weight="800">4 / 5</text>

  <!-- CTA buttons -->
  <rect x="34" y="715" width="322" height="44" rx="22" fill="#5E9BF5"/>
  <text x="142" y="743" fill="#FFFFFF" font-family="Pretendard, Apple SD Gothic Neo, sans-serif" font-size="14" font-weight="700">AI와 대화 이어가기</text>

  <rect x="34" y="770" width="322" height="44" rx="22" fill="#FFFFFF" stroke="#D8E3F6" stroke-width="2"/>
  <text x="157" y="798" fill="#5E88D9" font-family="Pretendard, Apple SD Gothic Neo, sans-serif" font-size="14" font-weight="700">기록 수정하기</text>
</svg>
