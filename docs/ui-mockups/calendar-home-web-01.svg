  <text x="336" y="852" fill="#677384" font-family="Pretendard, Apple SD Gothic Neo, sans-serif" font-size="15" font-weight="500">모바일에서는 캘린더와 요약 카드가 세로로 쌓이고, 웹에서는 좌측 캘린더와 우측 요약 패널 구조로 확장됩니다.</text>
  <text x="336" y="880" fill="#677384" font-family="Pretendard, Apple SD Gothic Neo, sans-serif" font-size="15" font-weight="500">주 CTA는 상단에 두고, 세부 액션은 우측 카드 내부에 배치해 화면 전환을 줄입니다.</text>
