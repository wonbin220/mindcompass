  <!-- web layout strip -->
  <rect x="104" y="686" width="706" height="110" rx="22" fill="#F8FAFF" stroke="#E7EDF5"/>
  <text x="132" y="720" fill="#17202B" font-family="Pretendard, Apple SD Gothic Neo, sans-serif" font-size="17" font-weight="700">웹 반응형 확장</text>
  <rect x="132" y="738" width="92" height="34" rx="12" fill="#FFFFFF" stroke="#E7EDF5"/>
  <rect x="236" y="738" width="154" height="34" rx="12" fill="#FFFFFF" stroke="#E7EDF5"/>
  <rect x="402" y="738" width="120" height="34" rx="12" fill="#FFFFFF" stroke="#E7EDF5"/>
  <rect x="534" y="738" width="98" height="34" rx="12" fill="#FFFFFF" stroke="#E7EDF5"/>
  <rect x="644" y="738" width="134" height="34" rx="12" fill="#FFFDF8" stroke="#F0E6C7"/>
  <text x="132" y="785" fill="#5E6C80" font-family="Pretendard, Apple SD Gothic Neo, sans-serif" font-size="14" font-weight="500">모바일의 1열 흐름을 유지하면서, 웹에서는 보조 정보 패널을 추가해 탐색성과 회고성을 강화</text>

  <!-- right summary -->
  <rect x="874" y="224" width="654" height="604" rx="28" fill="#FFFFFF"/>
  <text x="906" y="268" fill="#17202B" font-family="Pretendard, Apple SD Gothic Neo, sans-serif" font-size="24" font-weight="800">화면별 핵심 요약</text>
  <text x="906" y="298" fill="#738094" font-family="Pretendard, Apple SD Gothic Neo, sans-serif" font-size="15" font-weight="500">설명은 짧게 유지하고, “무슨 문제를 해결하는 화면인가”가 보이게 구성</text>

  <rect x="906" y="334" width="590" height="86" rx="18" fill="#F8FAFF"/>
  <text x="934" y="366" fill="#17202B" font-family="Pretendard, Apple SD Gothic Neo, sans-serif" font-size="16" font-weight="700">로그인</text>
  <text x="934" y="392" fill="#5A6779" font-family="Pretendard, Apple SD Gothic Neo, sans-serif" font-size="14" font-weight="500">서비스 진입과 인증을 담당하는 시작 화면</text>
  <text x="1210" y="392" fill="#7C8797" font-family="Pretendard, Apple SD Gothic Neo, sans-serif" font-size="13" font-weight="500">이메일 로그인 · 회원가입 이동</text>

  <rect x="906" y="438" width="590" height="96" rx="18" fill="#F8FAFF"/>
  <text x="934" y="470" fill="#17202B" font-family="Pretendard, Apple SD Gothic Neo, sans-serif" font-size="16" font-weight="700">캘린더 홈</text>
  <text x="934" y="496" fill="#5A6779" font-family="Pretendard, Apple SD Gothic Neo, sans-serif" font-size="14" font-weight="500">월간 감정 흐름과 날짜별 기록 여부를 확인하는 허브</text>
  <text x="934" y="520" fill="#7C8797" font-family="Pretendard, Apple SD Gothic Neo, sans-serif" font-size="13" font-weight="500">월간 감정 표시 · 날짜 선택 · 일기 요약 · 작성 연결</text>

  <rect x="906" y="552" width="590" height="96" rx="18" fill="#F8FAFF"/>
  <text x="934" y="584" fill="#17202B" font-family="Pretendard, Apple SD Gothic Neo, sans-serif" font-size="16" font-weight="700">일기 작성 / 상세</text>
  <text x="934" y="610" fill="#5A6779" font-family="Pretendard, Apple SD Gothic Neo, sans-serif" font-size="14" font-weight="500">감정 기록과 AI 해석이 만나는 핵심 화면</text>
  <text x="934" y="634" fill="#7C8797" font-family="Pretendard, Apple SD Gothic Neo, sans-serif" font-size="13" font-weight="500">제목/본문 · 대표 감정 · 강도 · AI 분석 · 위험도 확인</text>

  <rect x="906" y="666" width="590" height="86" rx="18" fill="#F8FAFF"/>
  <text x="934" y="698" fill="#17202B" font-family="Pretendard, Apple SD Gothic Neo, sans-serif" font-size="16" font-weight="700">채팅</text>
  <text x="934" y="724" fill="#5A6779" font-family="Pretendard, Apple SD Gothic Neo, sans-serif" font-size="14" font-weight="500">상태별 AI 응답을 제공하는 상담형 대화 화면</text>
  <text x="1210" y="724" fill="#7C8797" font-family="Pretendard, Apple SD Gothic Neo, sans-serif" font-size="13" font-weight="500">NORMAL · SUPPORTIVE · SAFETY</text>

  <rect x="906" y="770" width="590" height="86" rx="18" fill="#F8FAFF"/>
  <text x="934" y="802" fill="#17202B" font-family="Pretendard, Apple SD Gothic Neo, sans-serif" font-size="16" font-weight="700">리포트</text>
  <text x="934" y="828" fill="#5A6779" font-family="Pretendard, Apple SD Gothic Neo, sans-serif" font-size="14" font-weight="500">감정 패턴과 위험도 변화를 회고하는 분석 화면</text>
  <text x="1210" y="828" fill="#7C8797" font-family="Pretendard, Apple SD Gothic Neo, sans-serif" font-size="13" font-weight="500">월간 요약 · 감정 추이 · 위험도 추이</text>
</svg>
