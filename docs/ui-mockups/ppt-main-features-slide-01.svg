    <path d="M704 520 C718 514, 728 510, 742 512 C756 514, 764 500, 774 502" stroke="#5E9BF5" stroke-width="3.5" fill="none" stroke-linecap="round"/>
    <rect x="698" y="548" width="72" height="26" rx="10" fill="#FFFDF8" stroke="#F0E6C7"/>
