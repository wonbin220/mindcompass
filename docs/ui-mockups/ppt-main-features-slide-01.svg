  <circle cx="314" cy="368" r="17" fill="#FFFFFF" stroke="#DCE4EF" stroke-width="2"/>
  <circle cx="458" cy="368" r="17" fill="#FFFFFF" stroke="#DCE4EF" stroke-width="2"/>
  <circle cx="602" cy="368" r="17" fill="#FFFFFF" stroke="#DCE4EF" stroke-width="2"/>
  <circle cx="746" cy="368" r="17" fill="#FFFFFF" stroke="#DCE4EF" stroke-width="2"/>
  <text x="163" y="374" fill="#7A8798" font-family="Pretendard, Apple SD Gothic Neo, sans-serif" font-size="11" font-weight="700">1</text>
  <text x="307" y="374" fill="#7A8798" font-family="Pretendard, Apple SD Gothic Neo, sans-serif" font-size="11" font-weight="700">2</text>
  <text x="451" y="374" fill="#7A8798" font-family="Pretendard, Apple SD Gothic Neo, sans-serif" font-size="11" font-weight="700">3</text>
  <text x="595" y="374" fill="#7A8798" font-family="Pretendard, Apple SD Gothic Neo, sans-serif" font-size="11" font-weight="700">4</text>
  <text x="739" y="374" fill="#7A8798" font-family="Pretendard, Apple SD Gothic Neo, sans-serif" font-size="11" font-weight="700">5</text>

  <!-- thumbnails row -->
