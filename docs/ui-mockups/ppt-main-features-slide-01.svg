    <rect x="280" y="494" width="12" height="12" rx="4" fill="#EAF3FF"/>
    <rect x="300" y="494" width="12" height="12" rx="4" fill="#FFF7D6"/>
    <rect x="320" y="494" width="12" height="12" rx="4" fill="#EEF9EF"/>
    <rect x="266" y="584" width="72" height="26" rx="10" fill="#FFFDF8" stroke="#F0E6C7"/>
  </g>

  <g>
    <text x="398" y="406" fill="#5D6D82" font-family="Pretendard, Apple SD Gothic Neo, sans-serif" font-size="13" font-weight="700">일기</text>
    <rect x="388" y="422" width="116" height="220" rx="24" fill="#FFFFFF" stroke="#E7EDF5" stroke-width="2"/>
    <rect x="410" y="446" width="72" height="20" rx="8" fill="#F8FAFF"/>
    <rect x="410" y="478" width="72" height="70" rx="12" fill="#F8FAFF"/>
    <rect x="410" y="562" width="32" height="16" rx="8" fill="#FFF7D6"/>
    <rect x="450" y="562" width="32" height="16" rx="8" fill="#EAF3FF"/>
    <rect x="410" y="592" width="72" height="22" rx="11" fill="#5E9BF5"/>
  </g>

  <g>
    <text x="542" y="406" fill="#5D6D82" font-family="Pretendard, Apple SD Gothic Neo, sans-serif" font-size="13" font-weight="700">채팅</text>
    <rect x="532" y="422" width="116" height="220" rx="24" fill="#FFFFFF" stroke="#E7EDF5" stroke-width="2"/>
    <rect x="552" y="450" width="56" height="26" rx="10" fill="#F7FBF8" stroke="#DDEEE1"/>
    <rect x="576" y="490" width="48" height="22" rx="11" fill="#5E9BF5"/>
