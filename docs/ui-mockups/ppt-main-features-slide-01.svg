  <g>
    <text x="256" y="406" fill="#5D6D82" font-family="Pretendard, Apple SD Gothic Neo, sans-serif" font-size="13" font-weight="700">캘린더</text>
    <rect x="244" y="422" width="116" height="220" rx="24" fill="#FFFFFF" stroke="#E7EDF5" stroke-width="2"/>
