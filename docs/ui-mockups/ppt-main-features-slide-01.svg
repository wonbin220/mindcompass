<?xml version="1.0" encoding="UTF-8"?>
<!-- 기술팀장 발표용 주요 기능 화면 슬라이드 -->
<svg width="1600" height="900" viewBox="0 0 1600 900" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="1600" height="900" fill="#F3F6FB"/>

  <text x="72" y="78" fill="#17202B" font-family="Pretendard, Apple SD Gothic Neo, sans-serif" font-size="38" font-weight="800">주요 기능 화면</text>
  <text x="72" y="114" fill="#6F7C8F" font-family="Pretendard, Apple SD Gothic Neo, sans-serif" font-size="18" font-weight="500">감정 기록, AI 상담, 회고 흐름을 화면 단위로 정리한 MVP 구조</text>

  <rect x="72" y="150" width="208" height="42" rx="21" fill="#EAF3FF"/>
  <text x="124" y="177" fill="#4E86E6" font-family="Pretendard, Apple SD Gothic Neo, sans-serif" font-size="15" font-weight="700">모바일 우선 · 웹 확장</text>
  <rect x="294" y="150" width="186" height="42" rx="21" fill="#FFF7D6"/>
  <text x="346" y="177" fill="#7B6920" font-family="Pretendard, Apple SD Gothic Neo, sans-serif" font-size="15" font-weight="700">Safety-first UX</text>

  <!-- left visual area -->
  <rect x="72" y="224" width="770" height="604" rx="28" fill="#FFFFFF"/>
  <text x="104" y="268" fill="#17202B" font-family="Pretendard, Apple SD Gothic Neo, sans-serif" font-size="24" font-weight="800">핵심 화면 흐름</text>
  <text x="104" y="298" fill="#738094" font-family="Pretendard, Apple SD Gothic Neo, sans-serif" font-size="15" font-weight="500">로그인 → 캘린더 → 일기 → 채팅 → 리포트</text>

  <path d="M170 368H744" stroke="#DCE4EF" stroke-width="2" stroke-dasharray="7 7"/>
