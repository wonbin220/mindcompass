spring:
  datasource:
    url: jdbc:h2:mem:mindcompass;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    properties:
      hibernate:
        format_sql: false
  sql:
    init:
      mode: never

app:
  auth:
    jwt:
      secret: test-secret-key-with-at-least-32-bytes-long
      access-token-minutes: 60
      refresh-token-days: 14
  ai:
    base-url: http://localhost:8001
